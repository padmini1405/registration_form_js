<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <link href="./src/output.css" rel="stylesheet">
</head>

<body>
    <div class="p-4 mx-auto max-w-xl bg-white mt-10">
        <h2 class="text-3xl text-blue-500 font-bold">Registration Form</h2>
        <form class="mt-8 space-y-5" id="form">
            <div>
                <label class='text-sm text-slate-900 font-medium mb-2 block'>Name</label>
                <input type='text' placeholder='Enter Name' id="name"
                    class="w-full py-2.5 px-4 text-slate-800 bg-blue-100 border border-gray-200 focus:border-slate-900 focus:bg-transparent text-sm outline-0 transition-all" />
                <p id="nameError" class="text-red-500 text-sm mt-1"></p>
            </div>
            <div>
                <label class='text-sm text-slate-900 font-medium mb-2 block'>Email</label>
                <input type='email' placeholder='Enter Email' id="email"
                    class="w-full py-2.5 px-4 text-slate-800 bg-blue-100 border border-gray-200 focus:border-slate-900 focus:bg-transparent text-sm outline-0 transition-all" />
                <p id="emailError" class="text-red-500 text-sm mt-1"></p>
            </div>
            <div>
                <label class='text-sm text-slate-900 font-medium mb-2 block'>Password</label>
                <input type='password' placeholder='Enter Password' id="password"
                    class="w-full py-2.5 px-4 text-slate-800 bg-blue-100 border border-gray-200 focus:border-slate-900 focus:bg-transparent text-sm outline-0 transition-all" />
                <p id="passwordError" class="text-red-500 text-sm mt-1"></p>
            </div>
            <button type='submit' id="btn" disabled
                class="text-white bg-blue-500 font-medium hover:bg-blue-400 tracking-wide text-sm px-4 py-2.5 w-full border-0 outline-0 cursor-pointer disabled:bg-gray-400">Submit</button>
        </form>
    </div>
    <script src="script.js"></script>
</body>

</html>
